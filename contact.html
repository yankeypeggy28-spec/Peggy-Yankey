<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us | Tasty Haven</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="container">
        <nav>
          <a class="brand" href="index.html">Tasty Haven</a>
          <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
          </div>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="page-head">
        <h1>Contact Us</h1>
        <p class="section-copy">Have a question, a custom order, or feedback? Our team is ready to help.</p>
      </section>

      <section class="contact-grid">
        <div class="card">
          <h2 class="section-title">Reach us</h2>
          <p><strong>Email:</strong> yankeypeggy@gmail.com</p>
          <p><strong>Phone:</strong> +233 24 393 7528</p>
          <p><strong>Address:</strong> 12 Food Street, Accra, Ghana</p>
        </div>
        <div class="form-card">
          <form>
            <label for="name">Name</label>
            <input id="name" type="text" placeholder="Your name" />
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="you@example.com" />
            <label for="message">Message</label>
            <textarea id="message" rows="5" placeholder="Tell us how we can help"></textarea>
            <button type="button">Send message</button>
          </form>
        </div>
      </section>
    </main>

    <footer>
      <div class="container">
        <p>© <span id="year"></span> Tasty Haven. We answer quickly.</p>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
